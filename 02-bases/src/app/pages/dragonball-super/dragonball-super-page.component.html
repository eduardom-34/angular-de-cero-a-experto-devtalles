<h1>Dragonball Page</h1>
<hr>

<section class="row">
  <div class="col-12 col-sm-6">
    <h3>Agregar: {{ name() }} </h3>

    <input
    type="text"
    placeholder="Nombre"
    class="form-control"
    [value]="name()"
    (change)="name.set( txtName.value )"
    (input)="name.set( txtName.value )"
    #txtName
    />

    <input
    type="number"
    placeholder="Poder"
    class="form-control mt-2"
    [value]="power()"
    (input)="power.set(+txtPower.value)"
    #txtPower
    />

    <button (click)="addCharacter()" class="mt-2 btn btn-primary">Agregar</button>
  </div>

  <div class="col-12 col-sm-6">

    <dragonball-character-list [characters]="characters()"></dragonball-character-list>

  </div>

</section>
